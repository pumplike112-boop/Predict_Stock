name: Daily Market Prediction

on:
  schedule:
    # รันทุกวันจันทร์-ศุกร์ เวลา 07:00 น. (เวลาไทย) = 00:00 UTC
    # เวลานี้: หลังตลาดสหรัฐปิด + ก่อนตลาดไทยเปิด (ได้ข้อมูลครบทั้ง 2 ตลาด)
    - cron: '0 0 * * 1-5'
    
    # (ตัวเลือก) รันเพิ่มเวลา 17:00 น. (เวลาไทย) = 10:00 UTC
    # เวลานี้: หลังตลาดไทยปิด (สำหรับดูสรุปท้ายวัน)
    # - cron: '0 10 * * 1-5'
  
  workflow_dispatch: # Allow manual trigger anytime

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run market prediction
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python predict_markets.py
